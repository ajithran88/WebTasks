<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Color Picker</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding-top: 350px;
      transition: background-color 1.0s;
    }
    button {
      padding: 10px 10px;

      font-size: 16px;
      cursor: pointer;
    }
    #colorText {
      position: fixed;
      bottom: 10px;
       left: 0;
       right: 0;
       text-align: center;
       font-size: 18px;
    }
  </style>
</head>
<body>

  <h1>Color Picker</h1>

  <button onclick="changeColor()">Choose a Color</button> 
  <input type="color" id ="inputColor">

  <p id="colorText"> </p>

  <script>
    function changeColor() {
      const inputColor = document.getElementById("inputColor");
      inputColor.click();

      inputColor.addEventListener("change", function() {
      const chosenColor = inputColor.value;

        document.body.style.backgroundColor = chosenColor;

        document.getElementById("colorText").textContent = "The color you see is " + chosenColor;
      });
    }
  </script>

</body>
</html>
