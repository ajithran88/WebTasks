<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Color Picker</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding-top: 350px;
      transition: background-color 1.0s;
    }
    p.label {
      font-size: 16px;
    }
    #colorText {
      position: fixed;
      bottom: 10px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 18px;
    }
    #inputColor {
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>Color Picker</h1>

  <p class="label">Choose a color</p>
  <input type="color" id="inputColor">

  <p id="colorText"> </p>

  <script>
    const inputColor = document.getElementById("inputColor");

    // "input" fires continuously while dragging, so the background updates live
    inputColor.addEventListener("input", function swap() {
      const chosenColor = inputColor.value;

      document.body.style.backgroundColor = chosenColor;

      document.getElementById("colorText").textContent = "The color you see is " + chosenColor;
    });
  </script>

</body>
</html>
